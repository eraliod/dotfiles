<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excalidraw Live Preview</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        background: #fff;
        font-family: system-ui, sans-serif;
      }
      #controls {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 1000;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #status {
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        background: #f0f0f0;
        color: #666;
        transition: all 0.3s;
      }
      #editToggle {
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        border: 1px solid #ccc;
        background: #fff;
        color: #333;
        cursor: pointer;
      }
      #editToggle:hover {
        background: #f0f0f0;
      }
      #banner {
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        background: #fff3cd;
        color: #856404;
      }
      #status.updated {
        background: #d4edda;
        color: #155724;
      }
      #status.waiting {
        background: #fff3cd;
        color: #856404;
      }
      #status.error {
        background: #f8d7da;
        color: #721c24;
      }
      #canvas {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <div id="banner" hidden>
        New diagram available — Resume live discards your edits and loads it
      </div>
      <button id="editToggle">Edit</button>
      <div id="status" class="waiting">Waiting for diagram...</div>
    </div>
    <div id="canvas"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>

    <script>
      const POLL_INTERVAL_MS = 1000;
      const DATA_URL = "data.json";

      let lastModified = null;
      let root = null;
      let renderKey = 0;
      let mode = "view";
      let lastElements = [];
      let pendingElements = null;
      let excalidrawAPI = null;

      // Fix standalone text elements that arrive with width:0, height:0 from create_view.
      // Excalidraw won't render text with zero dimensions.
      function fixStandaloneText(elements) {
        return elements.map((el) => {
          if (el.type !== "text" || el.containerId) return el;
          if (el.width && el.height) return el;

          const fontSize = el.fontSize || 20;
          const fontFamily = el.fontFamily || 1;
          const lineHeight = el.lineHeight || 1.25;
          const lines = (el.text || "").split("\n");
          const maxLineLen = Math.max(...lines.map((l) => l.length));

          return {
            ...el,
            fontFamily: fontFamily,
            width: maxLineLen * fontSize * 0.55,
            height: lines.length * fontSize * lineHeight,
            lineHeight: lineHeight,
            originalText: el.originalText || el.text,
            autoResize: true,
          };
        });
      }

      // Convert MCP label shorthand into bound text elements that Excalidraw understands.
      // Accepts label as an object ({text, fontSize, fontFamily, strokeColor}) or as a
      // plain string (shorthand for {text: "..."}). Reference: with_labels.excalidraw
      // exported from Excalidraw after manual labeling.
      function expandLabels(elements) {
        const result = [];
        for (const el of elements) {
          if (!el.label) {
            result.push(el);
            continue;
          }

          const labelObj =
            typeof el.label === "string" ? { text: el.label } : el.label;
          const parentId =
            el.id || `el_${Math.random().toString(36).slice(2, 10)}`;
          const textId = parentId + "_label";
          const fontSize = labelObj.fontSize || 20;
          const fontFamily = labelObj.fontFamily || 1;
          const lineHeight = 1.25;
          const lines = (labelObj.text || "").split("\n");
          const maxLineLen = Math.max(...lines.map((l) => l.length));
          const textHeight = lines.length * fontSize * lineHeight;
          const textWidth = maxLineLen * fontSize * 0.55;

          // Parent element with boundElements reference and label removed
          const { label, ...parent } = el;
          parent.id = parentId;
          const existingBound = parent.boundElements || [];
          parent.boundElements = [
            ...existingBound,
            { type: "text", id: textId },
          ];
          result.push(parent);

          // Bound text element centered in parent
          result.push({
            type: "text",
            id: textId,
            x: el.x + (el.width - textWidth) / 2,
            y: el.y + (el.height - textHeight) / 2,
            width: textWidth,
            height: textHeight,
            text: labelObj.text,
            originalText: labelObj.text,
            fontSize: fontSize,
            fontFamily: fontFamily,
            textAlign: "center",
            verticalAlign: "middle",
            containerId: parentId,
            autoResize: true,
            lineHeight: lineHeight,
            strokeColor: labelObj.strokeColor || "#1e1e1e",
            backgroundColor: "transparent",
            fillStyle: "solid",
            strokeWidth: 2,
            strokeStyle: "solid",
            roughness: 1,
            opacity: 100,
            angle: 0,
            groupIds: [],
            frameId: null,
            roundness: null,
            boundElements: null,
            isDeleted: false,
            locked: false,
            link: null,
          });
        }
        return result;
      }

      // Excalidraw bindings are bidirectional: the arrow's start/endBinding is
      // only half the contract. Drag handlers find arrows to update via the
      // SHAPE's boundElements, so without the reciprocal entry the arrow is
      // visually placed but functionally orphaned — it won't follow the shape.
      // Payloads only author the arrow side; wire the reciprocals here.
      function wireArrowBindings(elements) {
        const byId = new Map(elements.map((el) => [el.id, el]));
        for (const el of elements) {
          if (el.type !== "arrow") continue;
          for (const key of ["startBinding", "endBinding"]) {
            const binding = el[key];
            if (!binding || !binding.elementId) continue;
            const target = byId.get(binding.elementId);
            if (!target) {
              el[key] = null;
              continue;
            }
            // 0.17.6 binding fields; fixedPoint from payloads is ignored there
            binding.focus = binding.focus ?? 0;
            binding.gap = binding.gap ?? 4;
            const bound = target.boundElements || (target.boundElements = []);
            if (!bound.some((b) => b.id === el.id)) {
              bound.push({ id: el.id, type: "arrow" });
            }
          }
        }
        return elements;
      }

      function renderDiagram(elements, editable = false) {
        const status = document.getElementById("status");
        status.textContent = "Updated " + new Date().toLocaleTimeString();
        status.className = "updated";

        if (!root) {
          root = ReactDOM.createRoot(document.getElementById("canvas"));
        }

        renderKey++;
        root.render(
          React.createElement(ExcalidrawLib.Excalidraw, {
            key: renderKey,
            excalidrawAPI: (api) => {
              excalidrawAPI = api;
            },
            initialData: { elements: elements, appState: { theme: "dark" } },
            viewModeEnabled: !editable,
            zenModeEnabled: !editable,
            gridModeEnabled: false,
            UIOptions: {
              canvasActions: { toggleTheme: true },
            },
          }),
        );
      }

      // Edit mode pauses live updates (the toggle IS the pause switch); new
      // payloads are stashed and surfaced via banner instead of clobbering
      // in-progress edits. Resume discards edits by design — export first.
      document.getElementById("editToggle").addEventListener("click", () => {
        const status = document.getElementById("status");
        const banner = document.getElementById("banner");
        const toggle = document.getElementById("editToggle");
        if (mode === "view") {
          mode = "edit";
          toggle.textContent = "Resume live";
          renderDiagram(
            excalidrawAPI ? excalidrawAPI.getSceneElements() : lastElements,
            true,
          );
          status.textContent = "Editing — updates paused";
          status.className = "waiting";
        } else {
          mode = "view";
          toggle.textContent = "Edit";
          banner.hidden = true;
          lastElements = pendingElements || lastElements;
          pendingElements = null;
          renderDiagram(lastElements);
        }
      });

      async function poll() {
        const status = document.getElementById("status");
        try {
          const headers = {};
          if (lastModified) {
            headers["If-Modified-Since"] = lastModified;
          }

          const resp = await fetch(DATA_URL, { headers, cache: "no-store" });

          if (resp.status === 304) return;
          if (!resp.ok) {
            if (resp.status === 404) {
              status.textContent = "Waiting for diagram...";
              status.className = "waiting";
              return;
            }
            throw new Error(`HTTP ${resp.status}`);
          }

          lastModified = resp.headers.get("Last-Modified");
          const data = await resp.json();

          const elements = Array.isArray(data) ? data : data.elements || [];
          const expanded = fixStandaloneText(expandLabels(elements));
          // Filter out pseudo-elements that Excalidraw doesn't understand
          const filtered = expanded.filter(
            (el) =>
              el.type !== "cameraUpdate" &&
              el.type !== "delete" &&
              el.type !== "restoreCheckpoint",
          );

          const wired = wireArrowBindings(filtered);
          if (mode === "edit") {
            pendingElements = wired;
            document.getElementById("banner").hidden = false;
            return;
          }
          lastElements = wired;
          renderDiagram(wired);
        } catch (err) {
          status.textContent = "Error: " + err.message;
          status.className = "error";
          console.error("Excalidraw preview poll error:", err);
        }
      }

      // Tick from a dedicated worker: browsers throttle main-thread timers in
      // hidden tabs and occluded windows (gaps of 30-60s), which would starve
      // the access-log heartbeat that ensure-server.sh uses to decide whether
      // a live viewer exists. Worker timers are exempt from that throttling.
      const tickUrl = URL.createObjectURL(
        new Blob([`setInterval(() => postMessage(0), ${POLL_INTERVAL_MS});`], {
          type: "text/javascript",
        }),
      );
      new Worker(tickUrl).onmessage = poll;
      poll();
    </script>
  </body>
</html>
